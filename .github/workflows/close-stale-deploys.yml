name: Close Stale Deploy PRs

on:
  pull_request:
    types: [closed]
    branches: [master]

jobs:
  close-stale:
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.merged == true &&
      startsWith(github.head_ref, 'deploy/')
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Determine deploy type
        id: deploy-type
        env:
          HEAD_REF: ${{ github.head_ref }}
          MERGED_PR: ${{ github.event.pull_request.number }}
        run: |
          if [[ "$HEAD_REF" == deploy/dev-* ]]; then
            echo "prefix=deploy/dev-" >> "$GITHUB_OUTPUT"
            echo "type=dev" >> "$GITHUB_OUTPUT"
          elif [[ "$HEAD_REF" == deploy/prod-* ]]; then
            echo "prefix=deploy/prod-" >> "$GITHUB_OUTPUT"
            echo "type=prod" >> "$GITHUB_OUTPUT"
          else
            echo "type=unknown" >> "$GITHUB_OUTPUT"
          fi
          echo "merged_pr=${MERGED_PR}" >> "$GITHUB_OUTPUT"

      - name: Close stale deploy PRs
        if: steps.deploy-type.outputs.type != 'unknown'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREFIX: ${{ steps.deploy-type.outputs.prefix }}
          MERGED_PR: ${{ steps.deploy-type.outputs.merged_pr }}
        run: |
          gh pr list --repo "$GITHUB_REPOSITORY" --state open --head "$PREFIX" --json number --jq '.[].number' | while read pr_number; do
            if [ -n "$pr_number" ] && [ "$pr_number" != "$MERGED_PR" ]; then
              echo "Closing stale PR #${pr_number}"
              gh pr close "$pr_number" --repo "$GITHUB_REPOSITORY" --delete-branch || true
            fi
          done
