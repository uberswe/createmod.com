name: Build and Deploy

on:
  pull_request:
    types:
      - opened
      - synchronize
      - closed
    branches:
      - master
      - development
  workflow_dispatch:
    inputs:
      no-cache:
        description: 'Build without cache'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io

jobs:
  # Test build on PR open/update (not merged)
  # Skip if this is an automated deployment PR (prevents infinite loop)
  test-build:
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.merged != true &&
      !startsWith(github.head_ref, 'chore/update-dev-image-') &&
      !startsWith(github.head_ref, 'chore/update-prod-image-')
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (test only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          build-args: |
            BUILD_VERSION=${{ github.sha }}
          cache-from: type=gha,scope=createmod
          cache-to: type=gha,mode=max,scope=createmod
          platforms: linux/amd64

  # Build and push on PR merge
  # Skip if this is an automated deployment PR (prevents infinite loop)
  build-and-push:
    runs-on: ubuntu-latest
    if: |
      (github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch') &&
      !startsWith(github.head_ref, 'chore/update-dev-image-') &&
      !startsWith(github.head_ref, 'chore/update-prod-image-')
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/createmod.com
          tags: |
            type=ref,event=branch,value=${{ github.event.pull_request.base.ref }}
            type=sha,prefix=${{ github.event.pull_request.base.ref }}-
            type=raw,value=latest,enable=${{ github.event.pull_request.base.ref == 'master' }}
            type=raw,value=dev-latest,enable=${{ github.event.pull_request.base.ref == 'development' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ github.sha }}
          cache-from: ${{ github.event.inputs.no-cache == 'true' && '' || 'type=gha,scope=createmod' }}
          cache-to: type=gha,mode=max,scope=createmod
          no-cache: ${{ github.event.inputs.no-cache == 'true' }}
          platforms: linux/amd64

  update-dev-manifest:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'development'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: development

      - name: Update dev deployment manifests
        env:
          IMAGE_TAGS: ${{ needs.build-and-push.outputs.image-tag }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          # Extract the commit-specific tag
          IMAGE_TAG=$(echo "${IMAGE_TAGS}" | tr ',' '\n' | grep "development-" | grep "${COMMIT_SHA:0:7}" | head -1)

          # Update createmod dev
          sed -i "s|image: ghcr.io/.*/createmod.com:.*|image: ${IMAGE_TAG}|g" k8s/createmod/dev/deployment.yaml

          echo "Updated createmod dev to: ${IMAGE_TAG}"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update dev deployment image to ${{ github.sha }}"
          title: "chore: update dev deployment image"
          body: |
            Automated PR to update the dev deployment image.

            - Commit: ${{ github.sha }}
            - PR: #${{ github.event.pull_request.number }}
          branch: chore/update-dev-image-${{ github.sha }}
          base: development
          delete-branch: true

  update-prod-manifest:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'master'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Update prod deployment manifests
        env:
          IMAGE_TAGS: ${{ needs.build-and-push.outputs.image-tag }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          # Extract the commit-specific tag
          IMAGE_TAG=$(echo "${IMAGE_TAGS}" | tr ',' '\n' | grep "master-" | grep "${COMMIT_SHA:0:7}" | head -1)

          # Update createmod prod
          sed -i "s|image: ghcr.io/.*/createmod.com:.*|image: ${IMAGE_TAG}|g" k8s/createmod/prod/deployment.yaml

          echo "Updated createmod prod to: ${IMAGE_TAG}"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update prod deployment image to ${{ github.sha }}"
          title: "chore: update prod deployment image"
          body: |
            Automated PR to update the prod deployment image.

            - Commit: ${{ github.sha }}
            - PR: #${{ github.event.pull_request.number }}
          branch: chore/update-prod-image-${{ github.sha }}
          base: master
          delete-branch: true
