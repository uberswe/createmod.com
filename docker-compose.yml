services:
  postgres:
    image: postgres:18-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: createmod
      POSTGRES_USER: createmod
      POSTGRES_PASSWORD: localdev
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U createmod"]
      interval: 2s
      timeout: 2s
      retries: 30

  minio:
    image: quay.io/minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 2s
      retries: 30

  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/createmod &&
      exit 0
      "

  meilisearch:
    image: getmeili/meilisearch:v1.43
    ports:
      - "7701:7700"
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: localdev
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7700/health"]
      interval: 2s
      timeout: 2s
      retries: 30

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "8025:8025"
      - "1025:1025"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgres://createmod:localdev@postgres:5432/createmod?sslmode=disable
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - BASE_URL=http://localhost:8080
      - PORT=8080
      - DEV=true
      - CREATE_ADMIN=true
      - AUTO_MIGRATE=true
      - LISTEN_ADDR=0.0.0.0:8080
      - MEILISEARCH_URL=http://meilisearch:7700
      - MEILISEARCH_KEY=localdev
      - SQLITE_PATH=/pb_data/data.db
    volumes:
      - ./pb_data:/pb_data
      - ./.env:/app/.env:ro
    ports:
      - "8091:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 2s
      timeout: 2s
      retries: 60
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mailhog:
        condition: service_started
      meilisearch:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  meilisearch_data:
