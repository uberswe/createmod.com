{{template "head.html" .}}
<div class="page">
  {{template "sidebar.html" .}}
  <div class="page-wrapper">
    {{template "header.html" .}}
    <main class="page-body">
      <div class="container-wide">
        <div class="mb-3 print:hidden">
          <div class="flex items-center gap-3">
            <div class="flex-1">
              <h2 class="page-title">Users</h2>
              <div class="text-secondary">Browse community members</div>
            </div>
          </div>
        </div>
        <div id="users-results">
          <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
            {{range  .Users}}
            <div class="">
              <div class="card">
                <div class="card-body">
                  <div class="flex items-center">
                    <div class="flex-1">
                      <div class="font-medium">
                        <a href="/author/{{ .Username }}">{{ .Username }}</a>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            {{end}}
          </div>
          <div class="flex justify-between items-center mt-4">
            <a {{ if .HasPrev }}href="{{ .PrevURL }}" hx-get="{{ .PrevURL }}" hx-target="#users-results" hx-select="#users-results" hx-swap="outerHTML" hx-push-url="true" class="btn btn-outline"{{ else }}class="btn btn-outline disabled" tabindex="-1" aria-disabled="true"{{ end }}>Previous</a>
            <div class="text-secondary">Page {{ .Page }}</div>
            <a {{ if .HasNext }}href="{{ .NextURL }}" hx-get="{{ .NextURL }}" hx-target="#users-results" hx-select="#users-results" hx-swap="outerHTML" hx-push-url="true" class="btn btn-outline"{{ else }}class="btn btn-outline disabled" tabindex="-1" aria-disabled="true"{{ end }}>Next</a>
          </div>
        </div>
      </div>
    </main>
    {{template "footer.html" .}}
  </div>
</div>
{{template "foot.html" .}}
