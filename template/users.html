{{template "head.html" .}}
<div class="page">
  {{template "sidebar.html" .}}
  <div class="page-wrapper">
    {{template "header.html" .}}
    <div class="page-body">
      <div class="container-xl">
        <div class="page-header d-print-none">
          <div class="row align-items-center">
            <div class="col">
              <h2 class="page-title">Users</h2>
              <div class="text-secondary">Browse community members</div>
            </div>
          </div>
        </div>
        <div id="users-results">
          <div class="row row-cards">
            {{range  .Users}}
            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
              <div class="card">
                <div class="card-body">
                  <div class="d-flex align-items-center">
                    <div class="flex-fill">
                      <div class="font-weight-medium">
                        <a href="/author/{{ .Username }}">{{ .Username }}</a>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            {{end}}
          </div>
          <div class="d-flex justify-content-between align-items-center mt-4">
            <a {{ if .HasPrev }}href="{{ .PrevURL }}" hx-get="{{ .PrevURL }}" hx-target="#users-results" hx-select="#users-results" hx-swap="outerHTML" hx-push-url="true" class="btn btn-outline-secondary"{{ else }}class="btn btn-outline-secondary disabled" tabindex="-1" aria-disabled="true"{{ end }}>Previous</a>
            <div class="text-secondary">Page {{ .Page }}</div>
            <a {{ if .HasNext }}href="{{ .NextURL }}" hx-get="{{ .NextURL }}" hx-target="#users-results" hx-select="#users-results" hx-swap="outerHTML" hx-push-url="true" class="btn btn-outline-secondary"{{ else }}class="btn btn-outline-secondary disabled" tabindex="-1" aria-disabled="true"{{ end }}>Next</a>
          </div>
        </div>
      </div>
    </div>
    {{template "footer.html" .}}
  </div>
</div>
{{template "foot.html" .}}
