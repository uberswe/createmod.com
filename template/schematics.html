{{template "head.html" .}}
<div class="page">
    {{template "sidebar.html" .}}
    <div class="page-wrapper">
        {{template "header.html" .}}
        <main class="page-body">
            <div class="container-wide">
                <div class="flex gap-3">
                <div class="grow min-w-0">
                <div id="schematics-results">
                    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
                        {{range .Schematics }}
                            {{ template "schematic_card_small.html" . }}
                        {{end}}
                    </div>
                    <div class="flex justify-between items-center mt-4">
                        <a {{ if .HasPrev }}href="{{ .PrevURL }}" hx-get="{{ .PrevURL }}" hx-target="#schematics-results" hx-select="#schematics-results" hx-swap="outerHTML" hx-push-url="true" class="btn btn-outline"{{ else }}class="btn btn-outline disabled" tabindex="-1" aria-disabled="true"{{ end }}>Previous</a>
                        <div class="text-secondary">Page {{ .Page }}</div>
                        <a {{ if .HasNext }}href="{{ .NextURL }}" hx-get="{{ .NextURL }}" hx-target="#schematics-results" hx-select="#schematics-results" hx-swap="outerHTML" hx-push-url="true" class="btn btn-outline"{{ else }}class="btn btn-outline disabled" tabindex="-1" aria-disabled="true"{{ end }}>Next</a>
                    </div>
                </div>
                <div class="max-w-md mx-auto pt-4">
                    <div class="alert alert-info" role="alert">
                        Find more schematics via the <a href="/search">Search page</a>
                    </div>
                </div>
                </div>
                <!-- Ad Rail (desktop only) -->
                <div class="ad-rail hidden xl:block">
                    <div id="schematics-adrail" class="mb-3"></div>
                </div>
                </div>
                <!-- Mobile ad (below content on smaller screens) -->
                <div id="schematics-mobile" class="xl:hidden mt-3 text-center"></div>
            </div>
        </main>
        {{template "footer.html" .}}
    </div>
</div>
{{template "foot.html" .}}
<script>
window['nitroAds'].createAd('schematics-adrail', {
  "refreshLimit": 10,
  "refreshTime": 30,
  "format": "display",
  "sizes": [
    ["300", "600"],
    ["300", "250"]
  ],
  "report": {
    "enabled": true,
    "icon": true,
    "wording": "Report Ad",
    "position": "top-right"
  },
  "mediaQuery": "(min-width: 1200px)"
});
window['nitroAds'].createAd('schematics-mobile', {
  "sizes": [
    ["320", "100"],
    ["320", "50"],
    ["300", "250"]
  ],
  "report": {
    "enabled": true,
    "icon": true,
    "wording": "Report Ad",
    "position": "top-right"
  },
  "mediaQuery": "(min-width: 320px) and (max-width: 1199px)"
});
</script>
