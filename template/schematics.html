{{template "head.html" .}}
<div class="page">
    {{template "sidebar.html" .}}
    <div class="page-wrapper">
        {{template "header.html" .}}
        <div class="page-body">
            <div class="container-xl">
                <div id="schematics-results">
                    <div class="row row-cards">
                        {{range .Schematics }}
                            {{ template "schematic_card_small.html" . }}
                        {{end}}
                    </div>
                    <div class="d-flex justify-content-between align-items-center mt-4">
                        <a {{ if .HasPrev }}href="{{ .PrevURL }}" hx-get="{{ .PrevURL }}" hx-target="#schematics-results" hx-select="#schematics-results" hx-swap="outerHTML" hx-push-url="true" class="btn btn-outline-secondary"{{ else }}class="btn btn-outline-secondary disabled" tabindex="-1" aria-disabled="true"{{ end }}>Previous</a>
                        <div class="text-secondary">Page {{ .Page }}</div>
                        <a {{ if .HasNext }}href="{{ .NextURL }}" hx-get="{{ .NextURL }}" hx-target="#schematics-results" hx-select="#schematics-results" hx-swap="outerHTML" hx-push-url="true" class="btn btn-outline-secondary"{{ else }}class="btn btn-outline-secondary disabled" tabindex="-1" aria-disabled="true"{{ end }}>Next</a>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 pt-4 m-auto">
                        <div class="alert alert-info" role="alert">
                            Find more schematics via the <a href="/search">Search page</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        {{template "footer.html" .}}
    </div>
</div>
{{template "foot.html" .}}
