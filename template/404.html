<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
    <meta http-equiv="X-UA-Compatible" content="ie=edge"/>
    <title>{{ T .Language "page.404.title" }}</title>
    <link rel="shortcut icon" href="/assets/x/favicon-192x192.png" type="image/x-icon">
    <!-- Tailwind CSS + site styles -->
    <link rel="stylesheet" href="/assets/x/style.css?v={{ AssetVer }}" />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-HG8QRCK47M"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-HG8QRCK47M');
    </script>
</head>
<body class="border-top-wide border-primary flex flex-col">
<main class="page page-center">
    <div class="max-w-sm mx-auto py-4">
        <div class="empty">
            <img src="/assets/x/logo.png" alt="CreateMod logo">
            <div class="empty-header">404</div>
            <p class="empty-title">{{ T .Language "Oops… You just found an error page" }}</p>
            <p class="empty-subtitle text-secondary">
                {{ T .Language "We are sorry but the page you are looking for was not found" }}
            </p>
            <div class="empty-action">
                <a href="{{ LangURL .Language "/" }}" class="btn btn-primary">
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M5 12l14 0" /><path d="M5 12l6 6" /><path d="M5 12l6 -6" /></svg>
                    {{ T .Language "Take me home" }}
                </a>
            </div>
        </div>
    </div>
</main>
{{template "footer.html" .}}
{{template "foot.html" .}}
