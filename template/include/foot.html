<script>
// Toast notification helper – centered under header, colored by variant
(function(){
  function ensureToastContainer(){
    var c = document.getElementById('toast-container');
    if (c) return c;
    c = document.createElement('div');
    c.id = 'toast-container';
    c.style.cssText = 'position:fixed;top:4rem;left:50%;transform:translateX(-50%);z-index:2140;display:flex;flex-direction:column;align-items:center;gap:.5rem;width:100%;max-width:600px;padding:0 1rem;pointer-events:none;';
    document.body.appendChild(c);
    return c;
  }
  window.showToast = function(message, variant){
    try {
      var c = ensureToastContainer();
      var v = variant || 'danger';
      var wrap = document.createElement('div');
      wrap.className = 'alert alert-important alert-' + v;
      wrap.role = 'alert';
      var bg = v === 'success' ? '#2fb344' : v === 'warning' ? '#f76707' : '#d63939';
      wrap.style.cssText = 'width:100%;box-shadow:0 4px 16px rgba(0,0,0,.25);pointer-events:auto;margin:0;background:' + bg + ';color:#fff;border:none;';
      var icon = '';
      if (v === 'danger') {
        icon = '<svg xmlns="http://www.w3.org/2000/svg" class="icon alert-icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M12 9v4" /><path d="M10.363 3.591l-8.106 13.534a1.914 1.914 0 0 0 1.636 2.871h16.214a1.914 1.914 0 0 0 1.636 -2.87l-8.106 -13.536a1.914 1.914 0 0 0 -3.274 0z" /><path d="M12 16h.01" /></svg>';
      } else if (v === 'success') {
        icon = '<svg xmlns="http://www.w3.org/2000/svg" class="icon alert-icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M5 12l5 5l10 -10" /></svg>';
      } else if (v === 'warning') {
        icon = '<svg xmlns="http://www.w3.org/2000/svg" class="icon alert-icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M12 9v4" /><path d="M10.363 3.591l-8.106 13.534a1.914 1.914 0 0 0 1.636 2.871h16.214a1.914 1.914 0 0 0 1.636 -2.87l-8.106 -13.536a1.914 1.914 0 0 0 -3.274 0z" /><path d="M12 16h.01" /></svg>';
      }
      var msgEl = document.createElement('span');
      msgEl.textContent = message || 'Something went wrong. Please try again.';
      var d = document.createElement('div');
      d.className = 'd-flex align-items-center';
      if (icon) d.insertAdjacentHTML('beforeend', icon);
      var fill = document.createElement('div');
      fill.className = 'flex-fill';
      fill.appendChild(msgEl);
      d.appendChild(fill);
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'btn-close ms-2';
      btn.setAttribute('aria-label', 'Close');
      btn.addEventListener('click', function(){ wrap.remove(); });
      d.appendChild(btn);
      wrap.appendChild(d);
      c.appendChild(wrap);
      setTimeout(function(){ try{ wrap.remove(); }catch(e){} }, 6000);
    } catch (e) {
      try { alert(message || 'Something went wrong. Please try again.'); } catch (_) {}
    }
  }
})();
</script>
<script>
// Basic HTMX error handler -> toast
window.addEventListener('htmx:responseError', function (evt) {
  try {
    console.error('HTMX error', evt);
    var msg = 'Something went wrong. Please try again.';
    if (evt && evt.detail && evt.detail.xhr && evt.detail.xhr.responseText) {
      // naive extract text if available
      msg = evt.detail.xhr.status + ' ' + (evt.detail.xhr.statusText || '')
    }
    if (typeof showToast === 'function') {
      showToast(msg, 'danger');
    } else {
      alert(msg);
    }
  } catch (e) {}
});
</script>
<script>
// Lazy-load images with class="lazy"
(function(){
  var observer;
  if ('IntersectionObserver' in window) {
    observer = new IntersectionObserver(function(entries, obs) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          var img = entry.target;
          var src = img.getAttribute('data-src');
          if (src) { img.src = src; img.removeAttribute('data-src'); }
          obs.unobserve(img);
        }
      });
    }, { root: null, rootMargin: '1000px', threshold: 0.01 });
  }
  function observeLazy(root) {
    var imgs = (root || document).querySelectorAll('.lazy[data-src]');
    if (observer) {
      imgs.forEach(function(img){ observer.observe(img); });
    } else {
      imgs.forEach(function(img){
        var src = img.getAttribute('data-src');
        if (src) { img.src = src; img.removeAttribute('data-src'); }
      });
    }
  }
  // Initial page load
  document.addEventListener('DOMContentLoaded', function(){ observeLazy(); });
  // HTMX navigation (re-observe new lazy images after content swap)
  document.addEventListener('htmx:afterSettle', function(evt){ observeLazy(evt.detail.elt); });
})();
</script>
<script>
// Re-initialize Bootstrap dropdowns & tooltips after HTMX page swaps.
// Tabler/Bootstrap sets up event delegation on document during initial load,
// but after HTMX body swaps the new elements need explicit initialization.
(function(){
  function reinit() {
    try {
      if (typeof bootstrap === 'undefined') return;
      document.querySelectorAll('[data-bs-toggle="dropdown"]').forEach(function(el) {
        // Dispose stale instance if any, then create fresh
        var inst = bootstrap.Dropdown.getInstance(el);
        if (inst) { try { inst.dispose(); } catch(e){} }
        new bootstrap.Dropdown(el);
      });
      document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(function(el) {
        var inst = bootstrap.Tooltip.getInstance(el);
        if (inst) { try { inst.dispose(); } catch(e){} }
        new bootstrap.Tooltip(el);
      });
    } catch(e) {}
  }
  // Run on HTMX settle for future swaps
  document.addEventListener('htmx:afterSettle', reinit);
  // Run immediately — this script executes inside swapped content,
  // so the new DOM is in place but Bootstrap hasn't seen it yet.
  reinit();
})();
</script>
<script>
// Attach PB token to HTMX requests when available
document.body.addEventListener('htmx:configRequest', function (evt) {
  try {
    if (typeof pb !== 'undefined' && pb.authStore && pb.authStore.token) {
      evt.detail.headers['Authorization'] = 'Bearer ' + pb.authStore.token;
    }
  } catch (e) {}
});
</script>
