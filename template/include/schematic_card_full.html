{{define "schematic_card_full.html"}}
<div class="col-sm-12 col-md-6 col-lg-6">
  <a href="/schematics/{{ .Name }}" class="d-block">
    <div class="card card-sm">
      <div class="card-header">
        <div class="row">
          <div class="col">
            {{ .Title }}
            {{ if .Paid }}<span class="badge badge-outline text-red ms-2">Paid</span>{{ end }}
          </div>
        </div>
      </div>
      <div class="card-body-borderless ratio ratio-16x9">
        <img loading="lazy" src="/api/files/schematics/{{ .ID }}/{{ .FeaturedImage }}?thumb=640x360"
             alt="Featured image of {{ .Title }}" class="img-fluid">
      </div>
      <div class="card-footer">
        <div class="row">
          <div class="col">{{ .CreatemodVersion }}</div>
          <div class="col">{{ .MinecraftVersion }}</div>
          <div class="col-auto">
            {{ range .Categories }}
            <span class="badge badge-outline text-blue">{{ .Name }}</span>
            {{ end }}
          </div>
        </div>
      </div>
    </div>
  </a>
</div>
{{end}}
