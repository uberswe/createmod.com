<!doctype html>
<html lang="{{ .Language }}" data-lang-prefix="{{ .LangPrefix }}">
<script>
// Inline theme init — runs synchronously before any CSS to prevent flash and
// ensure window.setTheme is available before any onclick handler can fire.
(function(){try{
var k="createmodTheme",d="dark";
var t=localStorage.getItem(k)||d;
document.documentElement.setAttribute("data-bs-theme",t);
if(t===d)document.documentElement.style.background="#1f2121";
window.setTheme=function(theme){
  try{
    localStorage.setItem(k,theme);
    document.documentElement.setAttribute("data-bs-theme",theme);
    if(document.body)document.body.setAttribute("data-bs-theme",theme);
    document.querySelectorAll('.hide-theme-light').forEach(function(el){el.style.display=theme==='light'?'none':'';});
    document.querySelectorAll('.hide-theme-dark').forEach(function(el){el.style.display=theme===d?'none':'';});
    document.documentElement.style.background="";
  }catch(e){}
};
}catch(e){}})();
</script>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
    <meta http-equiv="X-UA-Compatible" content="ie=edge"/>
    <title>CreateMod.com - {{ .Title }}</title>

    {{ if .Description }}<meta name="description" content="{{ .Description }}">{{ end }}
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://createmod.com{{ LangURL .Language .Slug }}">
    <meta property="og:title" content="{{ .Title }} - CreateMod.com">
    <meta property="og:description" content="{{ .Description }}">
    <meta property="og:image" itemprop="image" content="{{ .Thumbnail }}">
    <meta property="og:image:width" content="709">
    <meta property="og:image:height" content="360">
    <meta name="twitter:site" content="@uberswe">
    <meta name="twitter:title" content="{{ .Title }} - CreateMod.com">
    <meta name="twitter:description" content="{{ .Description }}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image:src" content="{{ .Thumbnail }}">


    {{ if .CanonicalURL }}<link rel="canonical" href="{{ .CanonicalURL }}">{{ else }}<link rel="canonical" href="https://createmod.com{{ .Slug }}">{{ end }}
    {{ if .PrevPageURL }}<link rel="prev" href="{{ .PrevPageURL }}">{{ end }}
    {{ if .NextPageURL }}<link rel="next" href="{{ .NextPageURL }}">{{ end }}
    {{ $slug := .Slug }}{{ range Hreflangs $slug }}
    <link rel="alternate" hreflang="{{ .HreflangCode }}" href="https://createmod.com{{ .FullPath $slug }}">{{ end }}
    <link rel="alternate" hreflang="x-default" href="https://createmod.com{{ $slug }}">
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemaps/sitemap.xml">
    <link rel="alternate" type="application/rss+xml" title="CreateMod.com RSS Feed" href="/feed.xml">
    {{ if .NoIndex }}<meta name="robots" content="noindex, follow">{{ else }}<meta name="robots" content="all">{{ end }}
    <link rel="shortcut icon" href="/assets/x/favicon-192x192.png" type="image/x-icon">
    <!-- Preconnect to CDN and font origins to reduce latency -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://rsms.me" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://s.nitropay.com" crossorigin>
    <!-- Inter font — loaded async to avoid blocking LCP -->
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" crossorigin="anonymous" media="print" onload="this.media='all'">
    <!-- Tabler CSS via CDN (critical — render-blocking) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.1.1/dist/css/tabler.min.css" crossorigin="anonymous" integrity="sha384-G7E9WIqG43QQ/+R056iUb+Na8tVpIeC6KNiX+8swjM+jOfEgrhPQ/eJjcLo/ftq/">
    <!-- Theme variables & Tabler overrides (local) -->
    <link rel="stylesheet" href="/assets/x/style.css?v={{ AssetVer }}" />
    <!-- Project overrides (small tweaks) -->
    <link rel="stylesheet" href="/assets/x/app.css?v={{ AssetVer }}" />
    <!-- Non-critical CSS: load async to avoid blocking LCP -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dropzone@6.0.0-beta.2/dist/dropzone.css" crossorigin="anonymous" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css" crossorigin="anonymous" media="print" onload="this.media='all'">

    <!-- HTMX (via jsdelivr to share CDN connection) -->
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@1.9.12/dist/htmx.min.js" defer crossorigin="anonymous"></script>
    <!-- DOMPurify – client-side HTML sanitization for defense-in-depth -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js" defer crossorigin="anonymous"></script>
    <!-- Tabler JS (Bootstrap 5 bundle) — in <head> to prevent re-execution on HTMX body swaps -->
    <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.1.1/dist/js/tabler.min.js" defer crossorigin="anonymous" integrity="sha384-2r3eTK9ussulv0Rm7xjvQuXVu5gRqRuctZwtAMvMjBWlcw69acmlK94r+ijsLkJu"></script>

    <script data-cfasync="false">window.nitroAds=window.nitroAds||{createAd:function(){return new Promise(e=>{window.nitroAds.queue.push(["createAd",arguments,e])})},addUserToken:function(){window.nitroAds.queue.push(["addUserToken",arguments])},queue:[]};</script>
    <script data-cfasync="false" async src="https://s.nitropay.com/ads-2143.js"></script>
    <script>
    // Track NitroPay ad instances and clear them on HTMX navigation so
    // new page ad scripts can call createAd() on fresh DOM containers.
    (function(){
      window._nitroAdInstances = window._nitroAdInstances || [];
      var origCreateAd = window.nitroAds.createAd.bind(window.nitroAds);
      window.nitroAds.createAd = function() {
        var p = origCreateAd.apply(window.nitroAds, arguments);
        window._nitroAdInstances.push(p);
        return p;
      };
      document.addEventListener('htmx:beforeSwap', function() {
        var instances = window._nitroAdInstances;
        window._nitroAdInstances = [];
        instances.forEach(function(p) {
          p.then(function(ad) {
            if (ad && typeof ad.onNavigate === 'function') { ad.onNavigate(); }
          }).catch(function(){});
        });
      });
    })();
    </script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-HG8QRCK47M"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-HG8QRCK47M');
    </script>

    <style>
      /* HTMX loading indicator bar */
      .htmx-indicator {
        position: fixed;
        top: 0;
        left: 0;
        height: 3px;
        width: 0;
        background: var(--tblr-primary, #bf9045);
        z-index: 2000;
        transition: width 0.3s ease;
        opacity: 0;
      }
      .htmx-indicator.htmx-request {
        width: 60%;
        opacity: 1;
        animation: htmx-progress 1.2s ease-in-out infinite;
      }
      @keyframes htmx-progress {
        0% { width: 10%; }
        50% { width: 70%; }
        100% { width: 90%; }
      }
    </style>
</head>
<body hx-boost="true" hx-indicator="#htmx-indicator">
<script>
  // Apply theme to body immediately to prevent flash of light content.
  (function(){try{var t=document.documentElement.getAttribute("data-bs-theme");if(t)document.body.setAttribute("data-bs-theme",t);}catch(e){}})();
  (function(){
    try {
      // Restore sidebar state from localStorage before first paint.
      // Default is expanded (pinned) on desktop; only collapse if explicitly set to '0'.
      if (window.innerWidth >= 992 && localStorage.getItem('sidebar-expanded') !== '0') {
        document.body.classList.add('sidebar-pinned');
      }

      // Enable sidebar transition only after initial layout is stable.
      // This prevents the margin-left transition from contributing to CLS.
      requestAnimationFrame(function(){ document.body.classList.add('sidebar-ready'); });

      // Guard: attach document-level listeners only once to prevent stacking.
      if (!window._sidebarInit) {
        window._sidebarInit = true;

        // Mobile hamburger toggle
        document.addEventListener('click', function(e){
          var btn = e.target && e.target.closest && e.target.closest('.sidebar-mobile-toggle');
          if (btn) {
            document.body.classList.toggle('sidebar-open');
          }
        });
        document.addEventListener('htmx:afterOnLoad', function(){
          document.body.classList.remove('sidebar-open');
        });

        // Mobile search toggle
        document.addEventListener('click', function(e){
          var btn = e.target && e.target.closest && e.target.closest('.mobile-search-toggle');
          if (btn) {
            var bar = document.querySelector('.mobile-search-bar');
            if (bar) {
              bar.classList.toggle('active');
              if (bar.classList.contains('active')) {
                var input = bar.querySelector('input[name="q"]');
                if (input) input.focus();
              }
            }
          }
        });

        // Desktop sidebar expand/collapse toggle
        document.addEventListener('click', function(e){
          var btn = e.target && e.target.closest && e.target.closest('#sidebar-toggle');
          if (!btn) return;
          var sidebar = document.getElementById('sidebar-menu');
          if (!sidebar) return;
          var expanded = sidebar.classList.toggle('sidebar-expanded');
          document.body.classList.toggle('sidebar-pinned', expanded);
          localStorage.setItem('sidebar-expanded', expanded ? '1' : '0');
          var label = document.getElementById('sidebar-toggle-label');
          if (label) label.textContent = expanded ? 'Collapse' : 'Expand';
        });

        // After HTMX swaps, re-apply sidebar state to the new DOM
        document.addEventListener('htmx:afterSettle', function(){
          var sidebar = document.getElementById('sidebar-menu');
          if (!sidebar || window.innerWidth < 992) return;
          var expanded = localStorage.getItem('sidebar-expanded') !== '0';
          sidebar.classList.toggle('sidebar-expanded', expanded);
          document.body.classList.toggle('sidebar-pinned', expanded);
          var label = document.getElementById('sidebar-toggle-label');
          if (label) label.textContent = expanded ? 'Collapse' : 'Expand';
        });
      }
    } catch(_) {}
  })();
</script>
<div id="htmx-indicator" class="htmx-indicator"></div>
