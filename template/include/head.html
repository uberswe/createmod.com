<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
    <meta http-equiv="X-UA-Compatible" content="ie=edge"/>
    <title>CreateMod.com - {{ .Title }}</title>

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://createmod.com/{{ .Slug }}">
    <meta property="og:title" content="{{ .Title }} - CreateMod.com">
    <meta property="og:description" content="{{ .Description }}">
    <meta property="og:image" itemprop="image" content="{{ .Thumbnail }}">
    <meta property="og:image:width" content="709">
    <meta property="og:image:height" content="360">
    <meta name="twitter:site" content="@uberswe">
    <meta name="twitter:title" content="{{ .Title }} - CreateMod.com">
    <meta name="twitter:description" content="{{ .Description }}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image:src" content="{{ .Thumbnail }}">


    {{ if .CanonicalURL }}<link rel="canonical" href="{{ .CanonicalURL }}">{{ end }}
    {{ if .PrevPageURL }}<link rel="prev" href="{{ .PrevPageURL }}">{{ end }}
    {{ if .NextPageURL }}<link rel="next" href="{{ .NextPageURL }}">{{ end }}
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemaps/sitemap.xml">
    {{ if .NoIndex }}<meta name="robots" content="noindex, follow">{{ else }}<meta name="robots" content="all">{{ end }}
    <link rel="shortcut icon" href="/assets/x/favicon-192x192.png" type="image/x-icon">
    <!-- Tabler CSS via CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.1.1/dist/css/tabler.min.css" crossorigin="anonymous" integrity="sha384-G7E9WIqG43QQ/+R056iUb+Na8tVpIeC6KNiX+8swjM+jOfEgrhPQ/eJjcLo/ftq/">
    <!-- Dropzone CSS via CDN (for upload pages) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dropzone@6.0.0-beta.2/dist/dropzone.css" crossorigin="anonymous">
    <!-- Theme variables & Tabler overrides (local) -->
    <link rel="stylesheet" href="/assets/x/style.css?v={{ AssetVer }}" />
    <!-- Project overrides (small tweaks) -->
    <link rel="stylesheet" href="/assets/x/app.css?v={{ AssetVer }}" />

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.12" defer crossorigin="anonymous" integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2"></script>

    <script data-cfasync="false">window.nitroAds=window.nitroAds||{createAd:function(){return new Promise(e=>{window.nitroAds.queue.push(["createAd",arguments,e])})},addUserToken:function(){window.nitroAds.queue.push(["addUserToken",arguments])},queue:[]};</script>
    <script data-cfasync="false" async src="https://s.nitropay.com/ads-2143.js"></script>

    <style>
      /* Simple HTMX indicator bar */
      .htmx-indicator {
        position: fixed;
        top: 0;
        left: 0;
        height: 3px;
        width: 0;
        background: var(--tblr-primary, #bf9045);
        z-index: 2000;
        transition: width 0.3s ease;
      }
      .htmx-request .htmx-indicator,
      body.htmx-request .htmx-indicator {
        width: 60%;
        animation: htmx-progress 1.2s ease-in-out infinite;
      }
      @keyframes htmx-progress {
        0% { width: 10%; }
        50% { width: 70%; }
        100% { width: 90%; }
      }
    </style>
</head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-HG8QRCK47M"></script>
<script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-HG8QRCK47M');
</script>
<body hx-boost="true" hx-indicator="#htmx-indicator">
<script>
  (function(){
    try {
      document.addEventListener('click', function(e){
        var btn = e.target && e.target.closest && e.target.closest('.sidebar-mobile-toggle');
        if (btn) {
          document.body.classList.toggle('sidebar-open');
        }
      });
      document.body.addEventListener('htmx:afterOnLoad', function(){
        document.body.classList.remove('sidebar-open');
      });
    } catch(_) {}
  })();
</script>
<div id="htmx-indicator" class="htmx-indicator"></div>
