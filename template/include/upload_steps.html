{{ define "upload_steps.html" }}
<div class="flex justify-center mb-4">
    <div class="w-full max-w-xl">
        <div class="steps steps-green steps-counter">
            <a href="/upload" class="step-item{{ if eq .UploadStep 1 }} active{{ end }}{{ if ge .UploadStep 2 }} done{{ end }}">{{ T .Language "Upload" }}</a>
            <a href="#" class="step-item{{ if eq .UploadStep 2 }} active{{ end }}{{ if ge .UploadStep 3 }} done{{ end }}" onclick="return false;">{{ T .Language "Review" }}</a>
            <a href="#" class="step-item{{ if eq .UploadStep 3 }} active{{ end }}" onclick="return false;">{{ T .Language "Publish" }}</a>
        </div>
    </div>
</div>
{{ end }}
