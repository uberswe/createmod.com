{{define "schematic_card_featured.html"}}
<div class="md:col-span-1 col-span-1 mb-3">
  <a href="/schematics/{{ .Name }}" class="block no-underline">
    <div class="card card-featured card-hover-lift overflow-hidden">
      <div class="ratio ratio-16x9 relative">
        <img loading="lazy" src="/api/files/schematics/{{ .ID }}/{{ urlPathEscape .FeaturedImage }}?thumb=320x180"
             srcset="/api/files/schematics/{{ .ID }}/{{ urlPathEscape .FeaturedImage }}?thumb=320x180 320w, /api/files/schematics/{{ .ID }}/{{ urlPathEscape .FeaturedImage }}?thumb=640x360 640w"
             sizes="(max-width: 767px) 100vw, 33vw"
             alt="Featured image of {{ .Title }}" class="w-full h-full object-cover" width="640" height="360"
             onerror="this.onerror=null;this.style.opacity='0.3'">
        {{ if .Paid }}<span class="badge bg-red card-badge-overlay">Paid</span>{{ end }}
      </div>
      <div class="card-img-overlay flex flex-col justify-end p-3">
        <h3 class="text-white mb-1" style="text-shadow: 0 1px 3px rgba(0,0,0,0.6);">{{ .Title }}</h3>
        <div class="flex items-center gap-2">
          {{ if .Author }}
          {{ if .Author.HasAvatar }}
          <span class="avatar avatar-xs" style="background-image: url({{ .Author.Avatar }})"></span>
          {{ end }}
          <span class="text-white/50 text-sm">{{ .Author.Username }}</span>
          {{ end }}
          {{ range .Categories }}
          <span class="badge badge-outline text-white">{{ .Name }}</span>
          {{ end }}
        </div>
      </div>
    </div>
  </a>
</div>
{{end}}
