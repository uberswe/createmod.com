{{ template "head.html" . }}
<div class="page">
    {{ template "sidebar.html" . }}
    <div class="page-wrapper">
        {{template "header.html" .}}
        <main class="page-body" style="padding:0;">
            <div style="position:relative;min-height:calc(100vh - 60px);">
                <div id="generator-viewport" style="width:100%;height:100%;position:absolute;top:0;left:0;"></div>
                <div class="generator-overlay">
                        <div class="generator-overlay-header" onclick="this.parentElement.classList.toggle('collapsed')">
                            <h3 class="mb-0">Ship Hull Generator</h3>
                            <svg xmlns="http://www.w3.org/2000/svg" class="icon generator-overlay-chevron" width="20" height="20" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6l6 -6"/></svg>
                        </div>
                        <div class="generator-overlay-body">
                            <div class="mb-2">
                                <div class="d-flex flex-wrap gap-1">
                                    <button class="btn btn-sm btn-outline-secondary gen-preset" data-preset="sloop">Sloop</button>
                                    <button class="btn btn-sm btn-outline-secondary gen-preset" data-preset="frigate">Frigate</button>
                                    <button class="btn btn-sm btn-outline-secondary gen-preset" data-preset="galleon">Galleon</button>
                                    <button class="btn btn-sm btn-outline-secondary gen-preset" data-preset="longship">Longship</button>
                                    <button class="btn btn-sm btn-outline-secondary gen-preset" data-preset="clipper">Clipper</button>
                                    <button class="btn btn-sm btn-outline-secondary gen-preset" data-preset="carrack">Carrack</button>
                                    <button class="btn btn-sm btn-outline-secondary gen-preset" data-preset="warship">Warship</button>
                                </div>
                            </div>
                            <div class="mb-2">
                                <label class="form-label mb-0">Length: <span id="val-length">40</span></label>
                                <input type="range" class="form-range gen-param" id="param-length" min="20" max="200" value="40" step="1">
                            </div>
                            <div class="mb-2">
                                <label class="form-label mb-0">Beam: <span id="val-beam">10</span></label>
                                <input type="range" class="form-range gen-param" id="param-beam" min="4" max="40" value="10" step="1">
                            </div>
                            <div class="mb-2">
                                <label class="form-label mb-0">Depth: <span id="val-depth">5</span></label>
                                <input type="range" class="form-range gen-param" id="param-depth" min="3" max="20" value="5" step="1">
                            </div>
                            <div class="mb-2">
                                <label class="form-label mb-0">Bottom Pinch: <span id="val-bottomPinch">0.35</span></label>
                                <input type="range" class="form-range gen-param" id="param-bottomPinch" min="0.1" max="0.7" value="0.35" step="0.05">
                            </div>
                            <div class="mb-2">
                                <label class="form-label mb-0">Hull Flare: <span id="val-hullFlare">0.15</span></label>
                                <input type="range" class="form-range gen-param" id="param-hullFlare" min="0" max="0.6" value="0.15" step="0.05">
                            </div>
                            <div class="mb-2">
                                <label class="form-label mb-0">Flare Curve: <span id="val-flareCurve">2.5</span></label>
                                <input type="range" class="form-range gen-param" id="param-flareCurve" min="1.2" max="4" value="2.5" step="0.1">
                            </div>
                            <div class="mb-2">
                                <label class="form-label mb-0">Tumblehome: <span id="val-tumblehome">0.05</span></label>
                                <input type="range" class="form-range gen-param" id="param-tumblehome" min="0" max="0.4" value="0.05" step="0.05">
                            </div>
                            <div class="mb-2">
                                <label class="form-label mb-0">Tumble Curve: <span id="val-tumbleCurve">3</span></label>
                                <input type="range" class="form-range gen-param" id="param-tumbleCurve" min="1.5" max="5" value="3" step="0.1">
                            </div>
                            <div class="mb-2">
                                <label class="form-label mb-0">Sheer Curve: <span id="val-sheerCurve">0.15</span></label>
                                <input type="range" class="form-range gen-param" id="param-sheerCurve" min="0" max="0.75" value="0.15" step="0.05">
                            </div>
                            <div class="mb-2">
                                <label class="form-label mb-0">Sheer Curve Exp: <span id="val-sheerCurveExp">2</span></label>
                                <input type="range" class="form-range gen-param" id="param-sheerCurveExp" min="1" max="4" value="2" step="0.1">
                            </div>
                            <div class="mb-2">
                                <label class="form-label mb-0">Bow Length: <span id="val-bowLength">8</span></label>
                                <input type="range" class="form-range gen-param" id="param-bowLength" min="2" max="40" value="8" step="1">
                            </div>
                            <div class="mb-2">
                                <label class="form-label mb-0">Bow Sharpness: <span id="val-bowSharpness">1.2</span></label>
                                <input type="range" class="form-range gen-param" id="param-bowSharpness" min="0.4" max="2.5" value="1.2" step="0.1">
                            </div>
                            <div class="mb-2">
                                <label class="form-label mb-0">Stern Style</label>
                                <select class="form-select form-select-sm gen-param" id="param-sternStyle">
                                    <option value="round" selected>Round</option>
                                    <option value="square">Square</option>
                                    <option value="pointed">Pointed</option>
                                </select>
                            </div>
                            <div class="mb-2">
                                <label class="form-label mb-0">Stern Length: <span id="val-sternLength">6</span></label>
                                <input type="range" class="form-range gen-param" id="param-sternLength" min="2" max="30" value="6" step="1">
                            </div>
                            <div class="mb-2">
                                <label class="form-label mb-0">Stern Sharpness: <span id="val-sternSharpness">0.8</span></label>
                                <input type="range" class="form-range gen-param" id="param-sternSharpness" min="0.2" max="2" value="0.8" step="0.1">
                            </div>
                            <div class="mb-2">
                                <label class="form-check form-switch mb-0">
                                    <input class="form-check-input gen-param" type="checkbox" id="param-hasRailings" checked>
                                    <span class="form-check-label">Railings</span>
                                </label>
                            </div>
                            <div class="mb-2">
                                <label class="form-check form-switch mb-0">
                                    <input class="form-check-input gen-param" type="checkbox" id="param-hasTrim" checked>
                                    <span class="form-check-label">Gunwale Trim</span>
                                </label>
                            </div>
                            <div class="mb-2">
                                <label class="form-label mb-0">Castle Height: <span id="val-castleHeight">0</span></label>
                                <input type="range" class="form-range gen-param" id="param-castleHeight" min="0" max="6" value="0" step="1">
                            </div>
                            <div class="mb-2">
                                <label class="form-label mb-0">Castle Length: <span id="val-castleLength">0</span></label>
                                <input type="range" class="form-range gen-param" id="param-castleLength" min="0" max="30" value="0" step="1">
                            </div>
                            <div class="mb-2">
                                <label class="form-label mb-0">Forecastle Height: <span id="val-forecastleHeight">0</span></label>
                                <input type="range" class="form-range gen-param" id="param-forecastleHeight" min="0" max="3" value="0" step="1">
                            </div>
                            <div class="mb-2">
                                <label class="form-label mb-0">Forecastle Length: <span id="val-forecastleLength">0</span></label>
                                <input type="range" class="form-range gen-param" id="param-forecastleLength" min="0" max="20" value="0" step="1">
                            </div>
                            <div class="mb-2">
                                <label class="form-check form-switch mb-0">
                                    <input class="form-check-input gen-param" type="checkbox" id="param-hasGunPorts">
                                    <span class="form-check-label">Gun Ports</span>
                                </label>
                            </div>
                            <div class="mb-2">
                                <label class="form-label mb-0">Gun Port Spacing: <span id="val-gunPortSpacing">4</span></label>
                                <input type="range" class="form-range gen-param" id="param-gunPortSpacing" min="2" max="8" value="4" step="1">
                            </div>
                            <div class="d-flex justify-content-between align-items-center mt-3">
                                <span id="gen-block-count" class="text-secondary">0 blocks</span>
                                <button class="btn btn-sm btn-primary" id="gen-download-btn" hx-disable hx-boost="false">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="20" height="20" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2 -2v-2"/><path d="M7 11l5 5l5 -5"/><path d="M12 4l0 12"/></svg>
                                    Download .nbt
                                </button>
                            </div>
                        </div>
                    </div>
                <div class="generator-ad-rail-sm d-none d-lg-block d-xl-none">
                    <div id="gen-sticky-adrail-lg" class="mb-3"></div>
                </div>
                <div class="generator-ad-rail d-none d-xl-block">
                    <div id="gen-video-nc" class="mb-3"></div>
                    <div id="gen-sticky-adrail" class="mb-3"></div>
                </div>
            </div>
        </main>
        {{template "footer.html" .}}
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js" crossorigin="anonymous"></script>
<script src="/assets/x/generator.js?v={{ AssetVer }}" hx-disable></script>
<script hx-disable>
(function(){
  var PRESETS = {
    sloop:    { length:30, beam:8,  depth:4,  bottomPinch:0.3,  hullFlare:0.1,  flareCurve:2.5, tumblehome:0,    tumbleCurve:3, sheerCurve:0.1,  sheerCurveExp:2, bowLength:6,  bowSharpness:1.2, sternStyle:'round',   sternLength:5,  sternSharpness:0.8, hasRailings:true,  hasTrim:true,  castleHeight:0, castleLength:0,  forecastleHeight:0, forecastleLength:0, hasGunPorts:false, gunPortSpacing:4 },
    frigate:  { length:60, beam:14, depth:7,  bottomPinch:0.35, hullFlare:0.15, flareCurve:2.5, tumblehome:0.05, tumbleCurve:3, sheerCurve:0.15, sheerCurveExp:2, bowLength:12, bowSharpness:1.4, sternStyle:'square',  sternLength:8,  sternSharpness:0.6, hasRailings:true,  hasTrim:true,  castleHeight:2, castleLength:10, forecastleHeight:1, forecastleLength:6, hasGunPorts:true,  gunPortSpacing:3 },
    galleon:  { length:80, beam:20, depth:10, bottomPinch:0.4,  hullFlare:0.2,  flareCurve:2,   tumblehome:0.1,  tumbleCurve:3, sheerCurve:0.3,  sheerCurveExp:2, bowLength:15, bowSharpness:1.0, sternStyle:'square',  sternLength:12, sternSharpness:0.5, hasRailings:true,  hasTrim:true,  castleHeight:4, castleLength:15, forecastleHeight:2, forecastleLength:8, hasGunPorts:true,  gunPortSpacing:3 },
    longship: { length:50, beam:8,  depth:3,  bottomPinch:0.2,  hullFlare:0.05, flareCurve:2,   tumblehome:0,    tumbleCurve:3, sheerCurve:0.2,  sheerCurveExp:1.5,bowLength:10, bowSharpness:1.5, sternStyle:'pointed', sternLength:10, sternSharpness:1.2, hasRailings:false, hasTrim:false, castleHeight:0, castleLength:0,  forecastleHeight:0, forecastleLength:0, hasGunPorts:false, gunPortSpacing:4 },
    clipper:  { length:70, beam:12, depth:6,  bottomPinch:0.25, hullFlare:0.1,  flareCurve:3,   tumblehome:0.05, tumbleCurve:3, sheerCurve:0.1,  sheerCurveExp:2, bowLength:14, bowSharpness:1.8, sternStyle:'round',   sternLength:8,  sternSharpness:1.0, hasRailings:true,  hasTrim:true,  castleHeight:1, castleLength:8,  forecastleHeight:0, forecastleLength:0, hasGunPorts:false, gunPortSpacing:4 },
    carrack:  { length:50, beam:16, depth:8,  bottomPinch:0.4,  hullFlare:0.2,  flareCurve:2,   tumblehome:0.1,  tumbleCurve:3, sheerCurve:0.25, sheerCurveExp:2, bowLength:10, bowSharpness:1.0, sternStyle:'square',  sternLength:8,  sternSharpness:0.5, hasRailings:true,  hasTrim:true,  castleHeight:5, castleLength:12, forecastleHeight:3, forecastleLength:8, hasGunPorts:false, gunPortSpacing:4 },
    warship:  { length:70, beam:16, depth:8,  bottomPinch:0.35, hullFlare:0.15, flareCurve:2.5, tumblehome:0.05, tumbleCurve:3, sheerCurve:0.15, sheerCurveExp:2, bowLength:14, bowSharpness:1.4, sternStyle:'square',  sternLength:10, sternSharpness:0.6, hasRailings:true,  hasTrim:true,  castleHeight:3, castleLength:12, forecastleHeight:1, forecastleLength:8, hasGunPorts:true,  gunPortSpacing:3 }
  };

  var RANGE_PARAMS = ['length','beam','depth','bottomPinch','hullFlare','flareCurve','tumblehome','tumbleCurve','sheerCurve','sheerCurveExp','bowLength','bowSharpness','sternLength','sternSharpness','castleHeight','castleLength','forecastleHeight','forecastleLength','gunPortSpacing'];
  var CHECK_PARAMS = ['hasRailings','hasTrim','hasGunPorts'];
  var SELECT_PARAMS = ['sternStyle'];

  function getParams() {
    var p = {};
    RANGE_PARAMS.forEach(function(k) {
      var el = document.getElementById('param-' + k);
      p[k] = el.step && el.step.indexOf('.') >= 0 ? parseFloat(el.value) : parseInt(el.value);
    });
    CHECK_PARAMS.forEach(function(k) {
      p[k] = document.getElementById('param-' + k).checked;
    });
    SELECT_PARAMS.forEach(function(k) {
      p[k] = document.getElementById('param-' + k).value;
    });
    return p;
  }

  function setParams(p) {
    RANGE_PARAMS.forEach(function(k) {
      var el = document.getElementById('param-' + k);
      if (el && p[k] !== undefined) {
        el.value = p[k];
        var lbl = document.getElementById('val-' + k);
        if (lbl) lbl.textContent = p[k];
      }
    });
    CHECK_PARAMS.forEach(function(k) {
      var el = document.getElementById('param-' + k);
      if (el && p[k] !== undefined) el.checked = p[k];
    });
    SELECT_PARAMS.forEach(function(k) {
      var el = document.getElementById('param-' + k);
      if (el && p[k] !== undefined) el.value = p[k];
    });
  }

  function updateLabels() {
    RANGE_PARAMS.forEach(function(k) {
      var el = document.getElementById('param-' + k);
      var lbl = document.getElementById('val-' + k);
      if (el && lbl) lbl.textContent = el.value;
    });
  }

  function refresh() {
    updateLabels();
    GeneratorApp.generate('/api/generators/hull', getParams());
  }

  function init() {
    if (!GeneratorApp.initScene('generator-viewport')) {
      setTimeout(init, 100);
      return;
    }

    document.querySelectorAll('.gen-param').forEach(function(el) {
      el.addEventListener('input', refresh);
    });

    document.querySelectorAll('.gen-preset').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        var p = PRESETS[this.getAttribute('data-preset')];
        if (p) { setParams(p); refresh(); }
      });
    });

    document.getElementById('gen-download-btn').addEventListener('click', function(e) {
      e.preventDefault();
      GeneratorApp.downloadNBT('/api/generators/hull/download', getParams());
    });

    refresh();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  // Ads
  window['nitroAds'] = window['nitroAds'] || { createAd: function() { return new Promise(function(e) { window['nitroAds'].queue.push(['createAd', arguments, e]); }); }, queue: [] };
  window['nitroAds'].createAd('gen-video-nc', {
    "format": "video-nc",
    "report": { "enabled": true, "icon": true, "wording": "Report Ad", "position": "top-right" },
    "mediaQuery": "(min-width: 1200px)"
  });
  window['nitroAds'].createAd('gen-sticky-adrail-lg', {
    "refreshLimit": 10,
    "refreshTime": 45,
    "refreshVisibleOnly": true,
    "renderVisibleOnly": true,
    "format": "sticky-stack",
    "stickyStackLimit": 15,
    "stickyStackSpace": 2.5,
    "stickyStackOffset": 110,
    "stickyStackResizable": false,
    "report": { "enabled": true, "icon": true, "wording": "Report Ad", "position": "top-right" },
    "mediaQuery": "(min-width: 992px) and (max-width: 1199px)"
  });
  var videoNcEl = document.getElementById('gen-video-nc');
  var adRailEl = videoNcEl && videoNcEl.closest('.ad-rail');
  var stickyStackTop = 110 + 200 + 16;
  if (videoNcEl && adRailEl && typeof ResizeObserver !== 'undefined') {
    var updateOffset = function () {
      var h = videoNcEl.getBoundingClientRect().height;
      if (h > 0) adRailEl.style.setProperty('--video-nc-height', h + 'px');
    };
    new ResizeObserver(updateOffset).observe(videoNcEl);
    updateOffset();
  }
  window['nitroAds'].createAd('gen-sticky-adrail', {
    "refreshVisibleOnly": true,
    "format": "sticky-stack",
    "stickyStackLimit": 15,
    "stickyStackSpace": 2.5,
    "stickyStackOffset": stickyStackTop,
    "stickyStackResizable": false,
    "report": { "enabled": true, "icon": true, "wording": "Report Ad", "position": "top-right" },
    "mediaQuery": "(min-width: 1200px)"
  });
})();
</script>
{{template "foot.html" .}}
