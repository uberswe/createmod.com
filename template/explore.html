{{template "head.html" .}}
<style>
.explore-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 0.5rem;
    padding: 0 0.5rem;
}
.explore-item {
    border-radius: 0.375rem;
    overflow: hidden;
    display: block;
}
.explore-item img {
    width: 100%;
    display: block;
    border-radius: 0.375rem;
    background: var(--tblr-border-color, #e0e0e0);
    aspect-ratio: 4 / 3;
    object-fit: cover;
    transition: transform 0.2s ease;
}
.explore-item:hover img {
    transform: scale(1.03);
}
.explore-loader {
    text-align: center;
    padding: 2rem 0;
}
.explore-loader .spinner-border {
    width: 2rem;
    height: 2rem;
    border-width: 0.2em;
}
</style>
<div class="page">
    {{template "sidebar.html" .}}
    <div class="page-wrapper">
        {{template "header.html" .}}
        <div class="page-body">
            <div class="d-flex gap-3">
                <div class="flex-grow-1 min-width-0">
                    <div class="explore-grid" id="explore-grid">
                    {{range $i, $image := .Images }}
                        <a class="explore-item" href="/schematics/{{ $image.Name }}" title="{{ $image.Title }}">
                            <img class="lazy"
                                 data-src="/api/files/schematics/{{ $image.ID }}/{{ $image.Image }}{{ if eq $image.Size "lg" }}?thumb=640x0{{ else if eq $image.Size "md" }}?thumb=400x0{{ else }}?thumb=240x0{{ end }}"
                                 alt="{{ $image.Title }}">
                        </a>
                    {{end}}
                    </div>
                    <div id="explore-sentinel" style="height:1px"></div>
                    <div class="explore-loader" id="explore-spinner" style="display:none">
                        <div class="spinner-border text-muted" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                    <!-- Ad: between gallery and info -->
                    <div id="explore-mid-desktop" class="d-none d-xl-block my-3 text-center"></div>
                    <div id="explore-mid-mobile" class="d-xl-none my-3 text-center"></div>
                </div>

                <!-- Ad Rail (desktop only) -->
                <div class="ad-rail d-none d-xl-block">
                    <div id="explore-adrail" class="mb-3"></div>
                </div>
            </div>
        </div>
        {{template "footer.html" .}}
    </div>
</div>
{{template "foot.html" .}}
<script>
window['nitroAds'].createAd('explore-adrail', {
  "refreshLimit": 10,
  "refreshTime": 30,
  "format": "display",
  "sizes": [
    ["300", "600"],
    ["300", "250"]
  ],
  "report": {
    "enabled": true,
    "icon": true,
    "wording": "Report Ad",
    "position": "top-right"
  },
  "mediaQuery": "(min-width: 1200px)"
});
// Desktop banner at bottom of gallery
window['nitroAds'].createAd('explore-mid-desktop', {
  "sizes": [
    ["728", "90"],
    ["970", "90"],
    ["300", "250"]
  ],
  "report": {
    "enabled": true,
    "icon": true,
    "wording": "Report Ad",
    "position": "top-right"
  },
  "mediaQuery": "(min-width: 1025px)"
});
// Mobile banner at bottom of gallery
window['nitroAds'].createAd('explore-mid-mobile', {
  "sizes": [
    ["320", "100"],
    ["320", "50"],
    ["300", "250"]
  ],
  "report": {
    "enabled": true,
    "icon": true,
    "wording": "Report Ad",
    "position": "top-right"
  },
  "mediaQuery": "(min-width: 320px) and (max-width: 1024px)"
});
</script>
<script>
(function(){
  var grid = document.getElementById('explore-grid');
  var sentinel = document.getElementById('explore-sentinel');
  var spinner = document.getElementById('explore-spinner');
  if (!grid || !sentinel) return;

  var seed = {{ .Seed }};
  var cursor = {{ len .Images }};
  var loading = false;

  function thumbParam(size) {
    if (size === 'lg') return '?thumb=640x0';
    if (size === 'md') return '?thumb=400x0';
    return '?thumb=240x0';
  }

  function appendImages(images) {
    var frag = document.createDocumentFragment();
    for (var i = 0; i < images.length; i++) {
      var img = images[i];
      var a = document.createElement('a');
      a.className = 'explore-item';
      a.href = '/schematics/' + img.name;
      a.title = img.title;
      var el = document.createElement('img');
      el.className = 'lazy';
      el.setAttribute('data-src', '/api/files/schematics/' + img.id + '/' + img.image + thumbParam(img.size));
      el.alt = img.title;
      a.appendChild(el);
      frag.appendChild(a);
    }
    grid.appendChild(frag);
    // Move sentinel after the new content so it stays at the bottom
    grid.parentNode.insertBefore(sentinel, grid.nextSibling);
    // Observe new images with the global lazy-load IntersectionObserver
    var appended = grid.querySelectorAll('.lazy[data-src]');
    if (window._lazyObserver) {
      appended.forEach(function(img){ window._lazyObserver.observe(img); });
    } else {
      appended.forEach(function(img){
        var src = img.getAttribute('data-src');
        if (src) { img.src = src; img.removeAttribute('data-src'); }
      });
    }
  }

  function loadMore() {
    if (loading) return;
    loading = true;
    if (spinner) spinner.style.display = '';
    fetch('/api/explore/images?seed=' + seed + '&cursor=' + cursor + '&limit=30')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.images && data.images.length > 0) {
          appendImages(data.images);
          cursor = data.cursor;
          seed = data.seed;
        }
        loading = false;
        if (spinner) spinner.style.display = 'none';
      })
      .catch(function() {
        loading = false;
        if (spinner) spinner.style.display = 'none';
      });
  }

  // IntersectionObserver watches the sentinel (always in layout) to trigger loading
  if ('IntersectionObserver' in window) {
    var observer = new IntersectionObserver(function(entries) {
      if (entries[0].isIntersecting) {
        loadMore();
      }
    }, { rootMargin: '600px' });
    observer.observe(sentinel);
  } else {
    // Fallback for old browsers: scroll event
    window.addEventListener('scroll', function() {
      var rect = sentinel.getBoundingClientRect();
      if (rect.top < window.innerHeight + 600) {
        loadMore();
      }
    });
  }
})();
</script>
