{{template "head.html" .}}
<style>
.explore-grid {
    columns: 5 220px;
    column-gap: 0.5rem;
    padding: 0 0.5rem;
}
.explore-item {
    break-inside: avoid;
    margin-bottom: 0.5rem;
    border-radius: 0.375rem;
    overflow: hidden;
    display: block;
}
.explore-item img {
    width: 100%;
    display: block;
    border-radius: 0.375rem;
    background: var(--tblr-border-color, #e0e0e0);
    aspect-ratio: 4 / 3;
    object-fit: cover;
    transition: transform 0.2s ease;
}
.explore-item:hover img {
    transform: scale(1.03);
}
</style>
<div class="page">
    {{template "sidebar.html" .}}
    <div class="page-wrapper">
        {{template "header.html" .}}
        <div class="page-body">
            <div class="d-flex gap-3">
                <div class="flex-grow-1 min-width-0">
                    <div class="explore-grid">
                    {{range $i, $image := .Images }}
                        <a class="explore-item" href="/schematics/{{ $image.Name }}" title="{{ $image.Title }}">
                            <img class="lazy"
                                 data-src="/api/files/schematics/{{ $image.ID }}/{{ $image.Image }}{{ if eq $image.Size "lg" }}?thumb=640x0{{ else if eq $image.Size "md" }}?thumb=400x0{{ else }}?thumb=240x0{{ end }}"
                                 alt="{{ $image.Title }}">
                        </a>
                    {{end}}
                    </div>
                    <!-- Ad: between gallery and info -->
                    <div id="explore-mid-desktop" class="d-none d-xl-block my-3 text-center"></div>
                    <div id="explore-mid-mobile" class="d-xl-none my-3 text-center"></div>
                    <div class="row">
                        <div class="col-md-6 pt-4 m-auto">
                            <div class="alert alert-info" role="alert">
                                {{ T .Language "Reload the page or" }} <a href="/explore">{{ T .Language "click here" }}</a> {{ T .Language "for 1000 random images." }}
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Ad Rail (desktop only) -->
                <div class="ad-rail d-none d-xl-block">
                    <div id="explore-adrail" class="mb-3"></div>
                </div>
            </div>
        </div>
        {{template "footer.html" .}}
    </div>
</div>
{{template "foot.html" .}}
<script>
window['nitroAds'].createAd('explore-adrail', {
  "refreshLimit": 10,
  "refreshTime": 30,
  "format": "display",
  "sizes": [
    ["300", "600"],
    ["300", "250"]
  ],
  "report": {
    "enabled": true,
    "icon": true,
    "wording": "Report Ad",
    "position": "top-right"
  },
  "mediaQuery": "(min-width: 1200px)"
});
// Desktop banner at bottom of gallery
window['nitroAds'].createAd('explore-mid-desktop', {
  "sizes": [
    ["728", "90"],
    ["970", "90"],
    ["300", "250"]
  ],
  "report": {
    "enabled": true,
    "icon": true,
    "wording": "Report Ad",
    "position": "top-right"
  },
  "mediaQuery": "(min-width: 1025px)"
});
// Mobile banner at bottom of gallery
window['nitroAds'].createAd('explore-mid-mobile', {
  "sizes": [
    ["320", "100"],
    ["320", "50"],
    ["300", "250"]
  ],
  "report": {
    "enabled": true,
    "icon": true,
    "wording": "Report Ad",
    "position": "top-right"
  },
  "mediaQuery": "(min-width: 320px) and (max-width: 1024px)"
});
</script>
