<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2121"/>
      <stop offset="100%" stop-color="#2a2c2c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Shield (security) -->
  <path d="M250 120 L250 240 Q250 300 320 330 Q390 300 390 240 L390 120 L320 95 Z" fill="none" stroke="#bf9045" stroke-width="3"/>
