  <rect x="490" y="285" width="20" height="55" rx="3" fill="#bf9045" opacity="0.4"/>
  <rect x="520" y="270" width="20" height="70" rx="3" fill="#bf9045" opacity="0.5"/>
  <rect x="550" y="260" width="20" height="80" rx="3" fill="#bf9045" opacity="0.6"/>
  <rect x="580" y="250" width="20" height="90" rx="3" fill="#bf9045" opacity="0.7"/>
  <rect x="610" y="275" width="20" height="65" rx="3" fill="#bf9045" opacity="0.5"/>
  <!-- Gear (features) -->
  <circle cx="680" cy="140" r="20" fill="none" stroke="#626976" stroke-width="2.5"/>
  <circle cx="680" cy="140" r="8" fill="none" stroke="#626976" stroke-width="2"/>
  <line x1="680" y1="115" x2="680" y2="122" stroke="#626976" stroke-width="3" stroke-linecap="round"/>
  <line x1="680" y1="158" x2="680" y2="165" stroke="#626976" stroke-width="3" stroke-linecap="round"/>
  <line x1="655" y1="140" x2="662" y2="140" stroke="#626976" stroke-width="3" stroke-linecap="round"/>
  <line x1="698" y1="140" x2="705" y2="140" stroke="#626976" stroke-width="3" stroke-linecap="round"/>
  <line x1="662" y1="122" x2="668" y2="128" stroke="#626976" stroke-width="3" stroke-linecap="round"/>
  <line x1="692" y1="152" x2="698" y2="158" stroke="#626976" stroke-width="3" stroke-linecap="round"/>
  <line x1="662" y1="158" x2="668" y2="152" stroke="#626976" stroke-width="3" stroke-linecap="round"/>
  <line x1="692" y1="128" x2="698" y2="122" stroke="#626976" stroke-width="3" stroke-linecap="round"/>
