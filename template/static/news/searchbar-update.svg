<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2121"/>
      <stop offset="100%" stop-color="#2a2c2c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Search bar -->
  <rect x="200" y="180" width="400" height="50" rx="25" fill="none" stroke="#bf9045" stroke-width="2.5"/>
  <!-- Magnifying glass -->
  <circle cx="240" cy="205" r="12" fill="none" stroke="#bf9045" stroke-width="2.5"/>
  <path d="M249 214 l8 8" stroke="#bf9045" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Search text cursor -->
  <rect x="270" y="195" width="2" height="20" fill="#bf9045" opacity="0.8"/>
  <!-- Results below -->
  <rect x="220" y="250" width="360" height="12" rx="3" fill="#626976" opacity="0.4"/>
  <rect x="220" y="272" width="320" height="12" rx="3" fill="#626976" opacity="0.3"/>
  <rect x="220" y="294" width="340" height="12" rx="3" fill="#626976" opacity="0.2"/>
  <!-- Lightning bolt (speed) -->
  <path d="M620 140 l-15 40 l20 0 l-15 40" fill="none" stroke="#bf9045" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Index lines -->
  <rect x="140" y="140" width="80" height="6" rx="2" fill="#bf9045" opacity="0.2"/>
  <rect x="140" y="155" width="60" height="6" rx="2" fill="#bf9045" opacity="0.2"/>
  <rect x="140" y="170" width="70" height="6" rx="2" fill="#bf9045" opacity="0.2"/>
  <rect x="140" y="185" width="50" height="6" rx="2" fill="#bf9045" opacity="0.2"/>
  <text x="400" y="380" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#626976">Search Update</text>
</svg>
