<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2121"/>
      <stop offset="100%" stop-color="#2a2c2c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Version tag -->
  <rect x="260" y="140" width="280" height="60" rx="8" fill="#bf9045" opacity="0.15" stroke="#bf9045" stroke-width="2"/>
  <text x="400" y="178" text-anchor="middle" font-family="monospace" font-size="24" fill="#bf9045">v0.5</text>
  <!-- Gear icon -->
  <circle cx="400" cy="280" r="40" fill="none" stroke="#bf9045" stroke-width="2.5" opacity="0.7"/>
  <circle cx="400" cy="280" r="15" fill="none" stroke="#bf9045" stroke-width="2.5" opacity="0.7"/>
  <!-- Gear teeth -->
  <rect x="394" y="232" width="12" height="16" rx="2" fill="#bf9045" opacity="0.5"/>
  <rect x="394" y="312" width="12" height="16" rx="2" fill="#bf9045" opacity="0.5"/>
  <rect x="432" y="274" width="16" height="12" rx="2" fill="#bf9045" opacity="0.5"/>
  <rect x="352" y="274" width="16" height="12" rx="2" fill="#bf9045" opacity="0.5"/>
  <!-- Wrench -->
  <path d="M500 320 l60 60" stroke="#626976" stroke-width="4" stroke-linecap="round"/>
  <circle cx="500" cy="320" r="10" fill="none" stroke="#626976" stroke-width="3"/>
  <!-- Small dots -->
  <circle cx="200" cy="150" r="3" fill="#bf9045" opacity="0.3"/>
  <circle cx="620" cy="120" r="2" fill="#bf9045" opacity="0.3"/>
  <circle cx="180" cy="350" r="2" fill="#bf9045" opacity="0.2"/>
  <text x="400" y="410" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#626976">Minor Changes</text>
</svg>
