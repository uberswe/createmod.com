<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2121"/>
      <stop offset="100%" stop-color="#2a2c2c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a84b"/>
      <stop offset="100%" stop-color="#9e7735"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Large "6" -->
  <text x="400" y="280" text-anchor="middle" font-family="sans-serif" font-size="180" font-weight="bold" fill="url(#gold)" opacity="0.9">6</text>
  <!-- Cog gear around the 6 -->
  <circle cx="400" cy="230" r="120" fill="none" stroke="#bf9045" stroke-width="1.5" opacity="0.3" stroke-dasharray="8 6"/>
  <!-- Sparkles / celebration -->
  <path d="M250 120 l5 15 l15 5 l-15 5 l-5 15 l-5 -15 l-15 -5 l15 -5z" fill="#bf9045" opacity="0.6"/>
  <path d="M560 100 l4 12 l12 4 l-12 4 l-4 12 l-4 -12 l-12 -4 l12 -4z" fill="#bf9045" opacity="0.5"/>
  <path d="M600 320 l3 9 l9 3 l-9 3 l-3 9 l-3 -9 l-9 -3 l9 -3z" fill="#bf9045" opacity="0.4"/>
  <path d="M180 300 l3 9 l9 3 l-9 3 l-3 9 l-3 -9 l-9 -3 l9 -3z" fill="#bf9045" opacity="0.4"/>
  <!-- Small cog -->
  <circle cx="620" cy="200" r="20" fill="none" stroke="#bf9045" stroke-width="2" opacity="0.5"/>
  <circle cx="620" cy="200" r="8" fill="none" stroke="#bf9045" stroke-width="2" opacity="0.5"/>
  <!-- Text -->
  <text x="400" y="390" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#bf9045">Create Mod 6.0.0</text>
  <text x="400" y="420" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#626976">A new era of mechanical builds</text>
</svg>
