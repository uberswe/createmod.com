<div id="tab-panel-{{ .Tab }}" class="tab-panel">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
        {{ range .Items }}
        {{template "schematic_card_small.html" .}}
        {{ end }}
    </div>
    {{ if or .HasPrev .HasNext }}
    <div class="flex justify-between items-center mt-4">
        <a {{ if .HasPrev }}href="{{ .PrevURL }}" hx-get="{{ .PrevURL }}" hx-target="#tab-panel-{{ .Tab }}" hx-swap="outerHTML" hx-push-url="false" class="btn btn-outline"{{ else }}class="btn btn-outline disabled" tabindex="-1" aria-disabled="true"{{ end }}>Previous</a>
        <div class="text-secondary">Page {{ .Page }}</div>
        <a {{ if .HasNext }}href="{{ .NextURL }}" hx-get="{{ .NextURL }}" hx-target="#tab-panel-{{ .Tab }}" hx-swap="outerHTML" hx-push-url="false" class="btn btn-outline"{{ else }}class="btn btn-outline disabled" tabindex="-1" aria-disabled="true"{{ end }}>Next</a>
    </div>
    {{ end }}
</div>
