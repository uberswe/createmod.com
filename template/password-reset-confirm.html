{{ template "head.html" . }}
<div class="page page-center">
    <div class="container container-tight py-4">
        <div class="text-center mb-4">
            <a href="." class="navbar-brand navbar-brand-autodark">
                <img src="/assets/x/logo.png" alt="CreateMod.com">
            </a>
        </div>
        {{ if .Success }}
        <div class="card card-md">
            <div class="card-body text-center py-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="icon mb-2 text-green icon-lg" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M12 12m-9 0a9 9 0 1 0 18 0a9 9 0 1 0 -18 0" /><path d="M9 12l2 2l4 -4" /></svg>
                <h3>Password Updated</h3>
                <div class="text-secondary">Your password has been changed. Please log in with your new password.</div>
                <a href="/login" class="btn btn-primary mt-3">Sign in</a>
            </div>
        </div>
        {{ else }}
        <form class="card card-md" method="post" action="/reset-password/{{ .Token }}" autocomplete="off" novalidate>
            <div class="card-body">
                <h2 class="card-title text-center mb-4">Set New Password</h2>
                {{ if .Error }}
                <div class="alert alert-danger">{{ .Error }}</div>
                {{ end }}
                <div class="mb-3">
                    <label class="form-label">New Password</label>
                    <input name="password" type="password" class="form-control" placeholder="Minimum 8 characters" autocomplete="new-password" required minlength="8">
                </div>
                <div class="form-footer">
                    <button type="submit" class="btn btn-primary w-100">Update Password</button>
                </div>
            </div>
        </form>
        {{ end }}
        <div class="text-center text-secondary mt-3">
            <a href="/login">Back to sign in</a>
        </div>
    </div>
</div>
{{template "footer.html" .}}
{{template "foot.html" .}}
