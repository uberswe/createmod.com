{{ template "head.html" . }}
<div class="page">
    {{ template "sidebar.html" . }}
    <div class="page-wrapper">
        {{template "header.html" .}}
        <main class="page-body">
            <div class="container-wide">
                <div class="grid grid-cols-1 gap-3">
                    <div class="w-full">
                        <div class="card">
                            <div class="grid grid-cols-12">
                                {{ template "settings_sidebar.html" . }}
                                <div class="w-full md:col-span-9 flex flex-col">
                                    <div class="card-body">
                                        <h2 class="mb-4">{{ T .Language "Statistics" }}</h2>
                                        <h3 class="card-title">{{ T .Language "Monthly Views" }}</h3>
                                        <div id="chart-views" style="min-height: 300px;"></div>
                                        <h3 class="card-title mt-4">{{ T .Language "Monthly Downloads" }}</h3>
                                        <div id="chart-downloads" style="min-height: 300px;"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        {{template "footer.html" .}}
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/apexcharts@3.54.1/dist/apexcharts.min.js"></script>
<script>
(function(){
    function initCharts() {
        var viewLabels = [{{ .ViewLabelsJSON }}];
        var viewValues = [{{ .ViewValuesJSON }}];
        var dlLabels = [{{ .DownloadLabelsJSON }}];
        var dlValues = [{{ .DownloadValuesJSON }}];

        var isDark = document.documentElement.classList.contains('dark');
        var labelColor = isDark ? '#a0aec0' : '#616876';
        var gridColor = isDark ? '#3a3f4b' : '#e0e0e0';

        var commonOpts = {
            chart: { type: 'area', height: 300, toolbar: { show: false }, zoom: { enabled: false }, foreColor: labelColor },
            dataLabels: { enabled: false },
            stroke: { curve: 'smooth', width: 2 },
            grid: { borderColor: gridColor, strokeDashArray: 4 },
            xaxis: { type: 'category', labels: { style: { colors: labelColor } } },
            yaxis: { labels: { style: { colors: labelColor } } },
            tooltip: { theme: isDark ? 'dark' : 'light', y: { formatter: function(v){ return v.toLocaleString(); } } }
        };

        var viewEl = document.querySelector('#chart-views');
        var dlEl = document.querySelector('#chart-downloads');
        if (viewEl) {
            while (viewEl.firstChild) viewEl.removeChild(viewEl.firstChild);
            new ApexCharts(viewEl, Object.assign({}, commonOpts, {
                series: [{ name: 'Views', data: viewValues }],
                xaxis: { categories: viewLabels, type: 'category', labels: { style: { colors: labelColor } } },
                colors: ['#206bc4']
            })).render();
        }
        if (dlEl) {
            while (dlEl.firstChild) dlEl.removeChild(dlEl.firstChild);
            new ApexCharts(dlEl, Object.assign({}, commonOpts, {
                series: [{ name: 'Downloads', data: dlValues }],
                xaxis: { categories: dlLabels, type: 'category', labels: { style: { colors: labelColor } } },
                colors: ['#2fb344']
            })).render();
        }
    }

    if (typeof ApexCharts !== 'undefined') {
        initCharts();
    } else {
        var s = document.querySelector('script[src*="apexcharts"]');
        if (s) { s.onload = initCharts; }
    }
})();
</script>
{{template "foot.html" .}}
