---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: meilisearch
  namespace: createmod-com-dev
  labels:
    app: meilisearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: meilisearch
  template:
    metadata:
      labels:
        app: meilisearch
    spec:
      containers:
        - name: meilisearch
          image: getmeili/meilisearch:v1.50
          ports:
            - containerPort: 7700
              name: http
          env:
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: meilisearch-secret
                  key: MEILI_MASTER_KEY
            # Migrate the index database in place on version bumps instead
            # of refusing to start ("database version X is incompatible with
            # engine version Y" -> CrashLoopBackOff). No-op when versions
            # already match, so it stays on permanently. Env form because the
            # image's entrypoint is tini and container args replace the CMD
            # (tini would exec the flag as a program).
            - name: MEILI_EXPERIMENTAL_DUMPLESS_UPGRADE
              value: "true"
            - name: MEILI_ENV
              value: "development"
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 12Gi
          volumeMounts:
            - name: data
              mountPath: /meili_data
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          emptyDir: {}
