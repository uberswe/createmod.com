---
# ConfigMap to disable Linkerd for backup jobs (Jobs + sidecars don't complete properly)
apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-pod-config
  namespace: createmod-com-dev
data:
  podAnnotations: |
    linkerd.io/inject: disabled
---
# k8up backup schedule for createmod-com-dev
# Backs up PVCs to Backblaze B2 every 6 hours
apiVersion: k8up.io/v1
kind: Schedule
metadata:
  name: createmod-backup
  namespace: createmod-com-dev
spec:
  # Reference pod config to disable Linkerd
  podConfigRef:
    name: backup-pod-config

  # Backend configuration (Backblaze B2)
  backend:
    repoPasswordSecretRef:
      name: backup-restic-password
      key: password
    s3:
      endpoint: s3.eu-central-003.backblazeb2.com
      bucket: k8s-cluster-backups
      accessKeyIDSecretRef:
        name: backup-s3-credentials
        key: username
      secretAccessKeySecretRef:
        name: backup-s3-credentials
        key: password

  # Backup schedule - every 6 hours
  backup:
    schedule: "0 */6 * * *"
    failedJobsHistoryLimit: 2
    successfulJobsHistoryLimit: 2

  # Check schedule - weekly on Sunday at 00:30
  check:
    schedule: "30 0 * * 0"

  # Prune old backups - weekly on Sunday at 01:30
  prune:
    schedule: "30 1 * * 0"
    retention:
      keepDaily: 30      # Keep last 30 days
      keepWeekly: 4      # Keep last 4 weeks
      keepMonthly: 12    # Keep last 12 months
