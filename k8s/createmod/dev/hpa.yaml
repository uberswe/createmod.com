---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: createmod
  namespace: createmod-com-dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: createmod
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
