---
apiVersion: v1
kind: ConfigMap
metadata:
  name: createmod-config
  namespace: createmod-com-dev
data:
  PORT: "8090"
  ENVIRONMENT: "dev"
  BASE_URL: "https://createmod-com.9m.se"
  SMTP_HOST: "sandbox.smtp.mailtrap.io"
  SMTP_PORT: "2525"
  SENDER_ADDRESS: "noreply@createmod.com"
  SENDER_NAME: "CreateMod"
  # OpenTelemetry Configuration
  OTEL_ENABLED: "true"
  OTEL_SERVICE_NAME: "createmod-com-dev"
  OTEL_SERVICE_VERSION: "1.0.0"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://opentelemetry-collector.monitoring.svc.cluster.local:4318"
  OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
  OTEL_TRACES_SAMPLER: "parentbased_traceidratio"
  OTEL_TRACES_SAMPLER_ARG: "1.0"
