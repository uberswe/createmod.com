---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: createmod
  namespace: createmod-com-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: createmod
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
