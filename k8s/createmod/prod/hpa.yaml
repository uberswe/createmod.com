---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: createmod
  namespace: createmod-com-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: createmod
  minReplicas: 4
  maxReplicas: 16
  metrics:
    # CPU only — deliberately no memory metric. Each pod carries the full
    # in-memory search/similarity indexes, so per-pod memory does not go
    # down when pods are added; memory-triggered scale-up during a balloon
    # just creates more ballooning pods (2026-07-24 OOM cascade: HPA scaled
    # 5 -> 9 and all 9 OOMed).
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 900
      policies:
        - type: Pods
          value: 1
          periodSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
