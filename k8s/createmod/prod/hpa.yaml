---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: createmod
  namespace: createmod-com-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: createmod
  minReplicas: 4
  maxReplicas: 16
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Pods
          value: 1
          periodSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
