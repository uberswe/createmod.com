---
apiVersion: v1
kind: ConfigMap
metadata:
  name: createmod-config
  namespace: createmod-com-prod
data:
  PORT: "8090"
  ENVIRONMENT: "production"
  BASE_URL: "https://createmod.com"
  SMTP_HOST: "smtp.eu.mailgun.org"
  SMTP_PORT: "587"
  SENDER_ADDRESS: "noreply@createmod.com"
  SENDER_NAME: "CreateMod"
  # OpenTelemetry Configuration
  OTEL_ENABLED: "true"
  OTEL_SERVICE_NAME: "createmod-com-prod"
  OTEL_SERVICE_VERSION: "1.0.0"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://opentelemetry-collector.monitoring.svc.cluster.local:4318"
  OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
  OTEL_TRACES_SAMPLER: "parentbased_traceidratio"
  OTEL_TRACES_SAMPLER_ARG: "0.1"
  # Meilisearch / Search A/B Test
  MEILISEARCH_URL: "http://meilisearch.createmod-com-prod.svc.cluster.local:7700"
  SEARCH_TEST_ENABLED: "true"
