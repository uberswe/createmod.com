---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: createmod
  namespace: createmod-com-prod
  labels:
    app: createmod
    environment: prod
spec:
  serviceName: createmod-headless
  replicas: 1
  selector:
    matchLabels:
      app: createmod
  template:
    metadata:
      labels:
        app: createmod
        environment: prod
      annotations:
        linkerd.io/inject: enabled
        config.linkerd.io/skip-outbound-ports: "443"
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: createmod
          image: ghcr.io/uberswe/createmod.com:master-d30a91c
          imagePullPolicy: Always
          ports:
            - containerPort: 8090
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: createmod-config
            - secretRef:
                name: createmod-secrets
          volumeMounts:
            - name: data
              mountPath: /app/pb_data
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 20Gi
