---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: createmod
  namespace: createmod-com-prod
  labels:
    app: createmod
    environment: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: createmod
  template:
    metadata:
      labels:
        app: createmod
        environment: prod
      annotations:
        linkerd.io/inject: enabled
        config.linkerd.io/skip-outbound-ports: "443"
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: createmod
          image: ghcr.io/uberswe/createmod.com:master-48e8fa7
          imagePullPolicy: Always
          ports:
            - containerPort: 8090
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: createmod-config
            - secretRef:
                name: createmod-secrets
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 4Gi
